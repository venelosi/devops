apiVersion: v1
kind: Service
metadata:
  name: client
  namespace: mern-devops
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: nlb
    service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing
spec:
  type: LoadBalancer
  selector:
    app: client
  ports:
    - port: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: client
  namespace: mern-devops
spec:
  replicas: 2
  selector:
    matchLabels:
      app: client
  template:
    metadata:
      labels:
        app: client
    spec:
      containers:
        - name: client
          image: ${ECR_REPO}/client:latest
          ports:
            - containerPort: 80
