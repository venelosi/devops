apiVersion: v1
kind: Service
metadata:
  name: server
  namespace: mern-devops
spec:
  type: ClusterIP
  selector:
    app: server
  ports:
    - port: 5050
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: server
  namespace: mern-devops
spec:
  replicas: 2
  selector:
    matchLabels:
      app: server
  template:
    metadata:
      labels:
        app: server
    spec:
      containers:
        - name: server
          image: ${ECR_REPO}/server:latest
          ports:
            - containerPort: 5050
          env:
            - name: ATLAS_URI
              value: mongodb://mongodb:27017/sample_training
